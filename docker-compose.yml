services:
  postgres:
    image: postgres:16
    container_name: f1_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # 127.0.0.1 prefix keeps the dev DB off the LAN — an unqualified
      # "5432:5432" binds to 0.0.0.0 (every host interface)
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
