name: fetch-f1-data

on:
  schedule:
    - cron: "17 6 * * 1" # Monday 06:17 UTC — primary post-race-weekend run
    - cron: "17 6 * * 4" # Thursday 06:17 UTC — redundancy; upserts make it a no-op
  workflow_dispatch: # manual runs from the Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - run: pip install -r backend/requirements.txt

      - run: python -m backend.pipeline.fetch_laps
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
