<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <pattern id="checker" width="6.5" height="6.5" patternUnits="userSpaceOnUse" patternTransform="rotate(-8)">
      <rect width="6.5" height="6.5" fill="#f4f4f6"/>
      <rect width="3.25" height="3.25" fill="#17171a"/>
      <rect x="3.25" y="3.25" width="3.25" height="3.25" fill="#17171a"/>
    </pattern>
  </defs>

  <!-- motion trail streaks, behind everything -->
  <g stroke="#7a7a82" stroke-linecap="round">
    <path d="M-2 12 L7 10.7" stroke-width="2.4" opacity="0.5"/>
    <path d="M-2 5 L7 3.7" stroke-width="2.2" opacity="0.35"/>
    <path d="M-1 19 L8 17.7" stroke-width="2.2" opacity="0.3"/>
  </g>

  <!-- pole + waving checkered flag, tilted forward for a sense of motion -->
  <g transform="rotate(-8 8 14)">
    <rect x="6" y="-3" width="4" height="38" rx="2" fill="#26262b"/>
    <path d="M10 -1
             C 24 -6, 40 -2, 48 3
             C 39 8, 37 12, 48 17
             C 34 21, 18 19, 10 19.5 Z"
          fill="url(#checker)"/>
  </g>

  <!-- laptop showing a live multi-color pie-chart readout -->
  <g>
    <rect x="20" y="14" width="27" height="20" rx="3" fill="#6b6f76"/>
    <rect x="23" y="17" width="21" height="14" rx="2" fill="#33363c"/>
    <circle cx="33.5" cy="24" r="6" fill="#ececed"/>
    <path d="M33.5 24 L33.5 18 A6 6 0 0 1 36.5 29.196 Z" fill="#3b82f6"/>
    <path d="M33.5 24 L36.5 29.196 A6 6 0 0 1 27.5 24 Z" fill="#f2a93b"/>
    <path d="M18 34 L46 34 L49 40 L15 40 Z" fill="#6b6f76"/>
    <rect x="31" y="35.6" width="6" height="1.6" rx="0.8" fill="#494c52"/>
  </g>
</svg>
